colors:
  linear: '#B07AA1'
  baseline: '#4C78A8'
  brainbert: '#54A24B'
  diver: '#F58518'
  popt: '#E45756'
  best: '#F58518'
model_summary:
  neural_conv_decoder:
    enabled: true
    config: configs/baselines/content_noncontent_task/neural_conv_decoder/supersubject.yml
    output_name: neural_conv_decoder_summary
plotting:
  half_peak_profile_conditions:
  - super_subject
  lag_curve_conditions:
  - super_subject
  - per_subject
  lag_plot_xlim:
  - -800
  - 800
  lag_curve_models:
  - baseline
  valid_best_lags:
  - 0
  best_lag_model_bar_textures:
    baseline: ///
    linear: ///
  half_peak_profile:
    enabled: true
    model: baseline
    output_name: baseline_half_peak_profile
    interpolate: true
  exclude_llm_decoding_and_gpt_surprise: true
  include_overall_scores: false
  per_region_brains:
    ignore_right_hemisphere: true
    colormaps:
      default: hot
    bounds:
      content_noncontent:
        min: 0.55
      gpt_surprise:
        min: 0.0
      gpt_surprise_multiclass:
        min: 0.5
      iu_boundary:
        min: 0.7
      llm_decoding:
        min: -4.3
      pos:
        min: 0.5
      sentence_onset:
        min: 0.75
      volume_level:
        min: 0.2
      whisper_embedding:
        min: 0.5
      word_embedding:
        min: 0.6
  include_error_bars: true
  check_best_lag_significance: false
  correct_best_lag_significance: false
  best_lag_summary_plot_style: bar
  task_groups:
    Semantic:
    - gpt_surprise
    - gpt_surprise_multiclass
    - sentence_onset
    Syntactic:
    - content_noncontent
    - pos
    Auditory:
    - volume_level
    - iu_boundary
    Mixed:
    - whisper_embedding
    - word_embedding
    - llm_decoding
    - llm_embedding_pretraining
  task_display_names:
    content_noncontent: Content vs. Non-Content
    gpt_surprise: LLM Surprise
    gpt_surprise_multiclass: LLM Surprise Multiclass
    iu_boundary: IU Boundary
    llm_decoding: Brain LLM
    llm_embedding_pretraining: LLM Embedding Pretraining
    pos: Part of Speech
    sentence_onset: Sentence Onset
    volume_level: Audio Intensity
    whisper_embedding: Whisper Embedding
    word_embedding: Word Embedding
  model_display_names:
    linear: Linear
    baseline: CNN
    brainbert: BrainBERT
    diver: DIVER
    popt: PopT
metrics:
  content_noncontent:
    column: test_roc_auc_mean
    higher_is_better: true
    label: ROC-AUC
    chance_level: 0.5
    min: 0.49
    max: 0.7
  gpt_surprise_multiclass:
    column: test_roc_auc_multiclass_mean
    higher_is_better: true
    label: ROC-AUC
    chance_level: 0.5
    min: 0.49
    max: 0.6
  iu_boundary:
    column: test_roc_auc_mean
    higher_is_better: true
    label: ROC-AUC
    chance_level: 0.5
    min: 0.49
    max: 0.95
  pos:
    column: test_roc_auc_multiclass_mean
    higher_is_better: true
    label: ROC-AUC
    chance_level: 0.5
    min: 0.49
    max: 0.7
  sentence_onset:
    column: test_roc_auc_mean
    higher_is_better: true
    label: ROC-AUC
    chance_level: 0.5
    min: 0.49
    max: 0.95
  volume_level:
    column: test_corr_mean
    higher_is_better: true
    label: Correlation
    min: 0.0
    max: 0.7
  whisper_embedding:
    column: test_pairwise_accuracy_mean
    higher_is_better: true
    label: ROC-AUC
    chance_level: 0.5
    min: 0.49
    max: 0.95
  word_embedding:
    column: test_word_avg_auc_roc_mean
    higher_is_better: true
    label: ROC-AUC
    chance_level: 0.5
    min: 0.49
    max: 0.95
