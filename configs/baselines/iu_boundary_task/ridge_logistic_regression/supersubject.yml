task_config:
  task_name: iu_boundary_task
  data_params:
    data_root: data
    electrode_file_path: processed_data/all_subject_sig.csv
    use_high_gamma: true
    window_width: 1.0
  task_specific_config:
    iu_boundaries_csv_path: processed_data/iu_boundaries.csv
training_params:
  batch_size: 512
  n_folds: 5
  min_lag: -1000
  max_lag: 1500
  lag_step_size: 500
  losses:
  - cross_entropy
  loss_weights:
  - 1.0
  metrics:
  - roc_auc
  early_stopping_metric: roc_auc
  smaller_is_better: false
  ridge_logistic_regression_baseline: true
  tensorboard_logging: false
  weight_decay: 0.001
  learning_rate: 0.05
model_spec:
  constructor_name: 'torch_linear_model'
  params:
    output_dim: 1
    bias: true
    activation: sigmoid
trial_name: ridge_logistic_regression_iu_boundary_supersubject
