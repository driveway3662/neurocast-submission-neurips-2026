task_config:
  task_name: volume_level_decoding_task
  data_params:
    data_root: data
    electrode_file_path: processed_data/all_subject_sig.csv
    use_high_gamma: true
    channel_reg_ex: null
    window_width: 0.2
    preprocessing_fn_name: window_rms
  task_specific_config:
    audio_path: stimuli/podcast.wav
    cutoff_hz: 8.0
    butter_order: 4
    zero_phase: true
    allow_resample_audio: true
    window_size: 200.0
    hop_size: 100.0
training_params:
  batch_size: 512
  n_folds: 5
  min_lag: -1000
  max_lag: 1250
  lag_step_size: 250
  losses:
  - mse
  loss_weights:
  - 1.0
  metrics:
  - mse
  - r2
  - corr
  early_stopping_metric: r2
  smaller_is_better: false
  ridge_regression_baseline: true
  tensorboard_logging: false
  weight_decay: 0.001
  learning_rate: 0.05
model_spec:
  constructor_name: 'torch_linear_model'
  params:
    output_dim: 1
    bias: true
    activation: linear
trial_name: ridge_regression_volume_level_per_subject
run_mode: per_subject
