task_config:
  task_name: word_embedding_decoding_task
  data_params:
    data_root: data
    word_column: word
    electrode_file_path: processed_data/all_subject_sig.csv
    use_high_gamma: true
    window_width: 1.0
  task_specific_config:
    embedding_type: gpt-2xl
    embedding_layer: 24
    embedding_pca_dim: 50
training_params:
  batch_size: 512
  n_folds: 5
  min_lag: -1000
  max_lag: 1500
  lag_step_size: 500
  losses:
  - mse
  loss_weights:
  - 1.0
  metrics:
  - mse
  - corr
  - cosine_sim
  - cosine_dist
  early_stopping_metric: cosine_sim
  smaller_is_better: false
  ridge_regression_baseline: true
  tensorboard_logging: false
trial_name: ridge_regression_word_embedding_per_region
model_spec:
  constructor_name: ''
  params:
    alphas:
    - 0.001
    - 0.01
    - 0.1
    - 1.0
    - 10.0
    - 100.0
    - 1000.0
    cv: 5
    backend: torch_cuda
    fit_intercept: true
run_mode: per_region
